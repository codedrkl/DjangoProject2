<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Chain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b',
                            900: '#18181b',
                            800: '#27272a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; color: #e4e4e7; }
    </style>
</head>
<body class="antialiased min-h-screen selection:bg-yellow-400/30">
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-8 py-4 flex items-center justify-between">
            <div class="text-xl font-black italic tracking-tighter uppercase text-white">
                FZ<span class="text-yellow-400">.Sentinel</span>
            </div>

            <div class="flex gap-6 text-sm font-bold uppercase tracking-widest text-zinc-500">
                <a href="{% url 'options:option_chain' %}"
                   class="transition-colors hover:text-white {% if request.resolver_match.url_name == 'option_chain' %}text-white{% endif %}">
                    Chain
                </a>
                <a href="{% url 'options:outcome_view' %}"
                   class="transition-colors hover:text-yellow-400 {% if request.resolver_match.url_name == 'outcome_view' %}text-yellow-400{% endif %}">
                    Outcomes
                </a>
                <a href="{% url 'options:footprint_view' %}"
                   class="transition-colors hover:text-cyan-400 {% if request.resolver_match.url_name == 'footprint_view' %}text-cyan-400{% endif %}">
                    Footprint
                </a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
